  audio_session: ^0.1.21
  connectivity_plus: ^6.1.4
  in_app_purchase: ^3.2.3
  cloud_functions: ^5.5.1
  email_auth: ^2.0.0
  flutter_svg: ^2.2.0
  dio: ^5.9.0
  path_provider: ^2.1.5
  country_code_picker: ^3.4.0
  sign_in_with_apple: ^7.0.1
