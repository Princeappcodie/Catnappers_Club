    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_database: ^11.3.5
  firebase_storage: ^12.4.6
  cloud_firestore: ^5.6.8
  app_links: ^3.4.3
  shared_preferences: ^2.5.3
